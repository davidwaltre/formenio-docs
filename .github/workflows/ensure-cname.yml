name: Ensure CNAME

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  ensure-cname:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write CNAME file
        run: echo "docs.formenio.de" > docs/CNAME

      - name: Commit CNAME
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CNAME
          git diff --cached --quiet || git commit -m "fix: restore CNAME for GitHub Pages [skip ci]" && git push || true
